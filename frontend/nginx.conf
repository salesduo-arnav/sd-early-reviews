server {
    listen 5173;

    # 1. Serve Front-End Files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Handover to React Router for SPA
    }

    # 2. Proxy API Requests to Backend Container
    # No trailing slash on proxy_pass — preserves the /api/ prefix in the forwarded URI
    location /api/ {
        proxy_pass http://backend:3030;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}